<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinyl Record Tracker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f1ea;
        color: #1f1f1f;
        margin: 0;
        padding: 32px 16px;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
      }

      h1 {
        margin-bottom: 16px;
      }

      form {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
      }

      input {
        flex: 1;
        padding: 12px 14px;
        border: 1px solid #c9c0b2;
        border-radius: 10px;
        font-size: 16px;
      }

      button {
        padding: 12px 18px;
        border: none;
        border-radius: 10px;
        background: #1f1f1f;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
      }

      .vinyl-record-card {
        display: none;
        grid-template-columns: 160px 1fr;
        gap: 18px;
        align-items: start;
        background: #fff;
        border: 1px solid #ddd2c2;
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .vinyl-record-card.visible {
        display: grid;
      }

      .vinyl-record-card img {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 14px;
        background: #ece6db;
      }

      .card-artwork-placeholder {
        width: 160px;
        height: 160px;
        border-radius: 14px;
        background: #ece6db;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
      }

      .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 12px 0;
      }

      .card-pill {
        padding: 6px 10px;
        border-radius: 999px;
        background: #f1ece4;
        font-size: 14px;
      }

      .card-label {
        margin: 0;
        color: #645c4f;
      }

      .card-title {
        margin: 6px 0 0;
        font-size: 28px;
      }

      .card-subtitle {
        margin: 8px 0 0;
        color: #4b463d;
      }

      @media (max-width: 640px) {
        form {
          flex-direction: column;
        }

        .vinyl-record-card,
        .vinyl-record-card.visible {
          grid-template-columns: 1fr;
        }

        .vinyl-record-card img,
        .card-artwork-placeholder {
          width: 100%;
          height: auto;
          aspect-ratio: 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome to the Vinyl Record Tracker!</h1>
      <form id="search-form">
        <input
          id="query"
          type="text"
          placeholder="Search by artist name or title"
        />
        <button type="submit">Search</button>
      </form>

      <div id="record-card" class="vinyl-record-card">
        <img id="record-cover" alt="Vinyl cover art" />
        <div id="record-cover-fallback" class="card-artwork-placeholder">
          LP
        </div>

        <div>
          <p class="card-label">Top Match</p>
          <h2 id="record-title" class="card-title"></h2>
          <p id="record-subtitle" class="card-subtitle"></p>
          <div id="record-meta" class="card-meta"></div>
        </div>
      </div>
    </main>

    <script>
      const form = document.getElementById("search-form");
      const recordCard = document.getElementById("record-card");
      const recordCover = document.getElementById("record-cover");
      const recordCoverFallback = document.getElementById(
        "record-cover-fallback",
      );
      const recordTitle = document.getElementById("record-title");
      const recordSubtitle = document.getElementById("record-subtitle");
      const recordMeta = document.getElementById("record-meta");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const query = document.getElementById("query").value.trim();

        if (!query) {
          console.log("Enter an artist name or title first.");
          return;
        }

        const params = new URLSearchParams();
        params.set("query", query);

        console.log("Sending search request...");
        hideCard();

        try {
          const response = await fetch(`/records/search?${params.toString()}`);
          const data = await response.json();

          console.log("Search response:", data);

          if (!response.ok) {
            console.log(`Request failed: ${data.detail || "Unknown error"}`);
            return;
          }

          if (!data.results.length) {
            console.log("No vinyl records found for that search.");
            return;
          }

          renderCard(data.results[0]);
          console.log(
            `Showing the top match. Found ${data.results.length} result(s).`,
          );
        } catch (error) {
          console.error(error);
          console.log("Request failed. Check that the backend is running.");
        }
      });

      function renderCard(record) {
        recordTitle.textContent = record.title || "Untitled release";
        recordSubtitle.textContent = formatLabels(record.labels);
        recordMeta.innerHTML = "";

        const metaItems = [];
        if (record.year) metaItems.push(record.year);
        if (Array.isArray(record.formats))
          metaItems.push(...record.formats.slice(0, 3));

        metaItems.forEach((item) => {
          const pill = document.createElement("span");
          pill.className = "card-pill";
          pill.textContent = item;
          recordMeta.appendChild(pill);
        });

        if (record.cover_image) {
          recordCover.src = record.cover_image;
          recordCover.style.display = "block";
          recordCoverFallback.style.display = "none";
        } else {
          recordCover.removeAttribute("src");
          recordCover.style.display = "none";
          recordCoverFallback.style.display = "flex";
        }

        recordCard.classList.add("visible");
      }

      function hideCard() {
        recordCard.classList.remove("visible");
      }

      function formatLabels(labels) {
        if (!Array.isArray(labels) || !labels.length) {
          return "Label unknown";
        }

        return labels.slice(0, 2).join(" • ");
      }
    </script>
  </body>
</html>
