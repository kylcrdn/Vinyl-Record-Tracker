<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinyl Record Tracker</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #1a1a2e;
        color: #eaeaea;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 3rem 1rem;
      }

      h1 {
        font-size: 1.8rem;
        color: #e94560;
        letter-spacing: 2px;
        margin-bottom: 1.5rem;
      }

      .search-bar {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }

      input[type="text"] {
        padding: 0.6rem 1rem;
        border-radius: 8px;
        border: 1px solid #334;
        background: #16213e;
        color: #eaeaea;
        font-size: 1rem;
        width: 240px;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: #e94560;
      }

      button {
        padding: 0.6rem 1.2rem;
        background: #e94560;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
      }

      button:hover {
        opacity: 0.85;
      }

      /* ── Record Card ── */
      .card {
        background: #0f3460;
        border-radius: 14px;
        width: min(420px, 100%);
        overflow: hidden;
        border: 1px solid #1e4080;
        display: none; /* hidden until data loads */
      }

      .card.visible {
        display: block;
      }

      .card-cover {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        background: #16213e;
        display: block;
      }

      .card-cover-placeholder {
        width: 100%;
        aspect-ratio: 1;
        background: #16213e;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 6rem;
      }

      .card-body {
        padding: 1.4rem;
      }

      .card-artists {
        font-size: 0.8rem;
        color: #f5a623;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 0.3rem;
      }

      .card-title {
        font-size: 1.4rem;
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 0.6rem;
      }

      .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 1rem;
      }

      .badge {
        background: rgba(255, 255, 255, 0.08);
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-size: 0.75rem;
      }

      .tracklist {
        list-style: none;
        border-top: 1px solid #1e4080;
        padding-top: 0.8rem;
      }

      .tracklist li {
        display: flex;
        gap: 0.75rem;
        padding: 0.3rem 0;
        font-size: 0.85rem;
        border-bottom: 1px solid #1e408040;
      }

      .tracklist li:last-child {
        border-bottom: none;
      }

      .track-pos {
        color: #8892a4;
        min-width: 1.8rem;
      }

      .status {
        color: #8892a4;
        font-size: 0.9rem;
        margin-top: 1rem;
      }

      .status.error {
        color: #e74c3c;
      }
    </style>
  </head>
  <body>
    <h1>&#127925; Vinyl Record Tracker</h1>

    <div class="search-bar">
      <input type="text" id="release-id" placeholder="Discogs Release ID" />
      <button onclick="fetchRecord()">Look Up</button>
    </div>

    <p id="status" class="status"></p>

    <div class="card" id="card">
      <img id="card-cover" class="card-cover" src="" alt="Album cover" />
      <div
        id="card-cover-placeholder"
        class="card-cover-placeholder"
        style="display: none"
      >
        &#9900;
      </div>
      <div class="card-body">
        <div class="card-artists" id="card-artists"></div>
        <div class="card-title" id="card-title"></div>
        <div class="card-meta" id="card-meta"></div>
        <ul class="tracklist" id="card-tracklist"></ul>
      </div>
    </div>

    <script>
      // Allow pressing Enter in the input to trigger lookup
      document.getElementById("release-id").addEventListener("keydown", (e) => {
        if (e.key === "Enter") fetchRecord();
      });

      async function fetchRecord() {
        const id = document.getElementById("release-id").value.trim();
        if (!id) return;

        setStatus("Loading…", false);
        hideCard();

        try {
          const res = await fetch(`/api/record/${encodeURIComponent(id)}`);
          const data = await res.json();

          if (!res.ok) {
            setStatus(data.detail || "Something went wrong.", true);
            return;
          }

          renderCard(data);
          setStatus("", false);
        } catch {
          setStatus("Could not reach the server.", true);
        }
      }

      function renderCard(r) {
        // Artists
        document.getElementById("card-artists").textContent =
          r.artists.join(", ");

        // Title
        document.getElementById("card-title").textContent = r.title;

        // Badges: year, genres, styles
        const badges = [...(r.year ? [r.year] : []), ...r.genres, ...r.styles];
        document.getElementById("card-meta").innerHTML = badges
          .map((b) => `<span class="badge">${esc(String(b))}</span>`)
          .join("");

        // Cover image
        const img = document.getElementById("card-cover");
        const placeholder = document.getElementById("card-cover-placeholder");
        if (r.cover) {
          img.src = r.cover;
          img.style.display = "block";
          placeholder.style.display = "none";
        } else {
          img.style.display = "none";
          placeholder.style.display = "flex";
        }

        // Tracklist
        document.getElementById("card-tracklist").innerHTML = r.tracklist
          .map(
            (t) =>
              `<li><span class="track-pos">${esc(t.position)}</span><span>${esc(t.title)}</span></li>`,
          )
          .join("");

        document.getElementById("card").classList.add("visible");
      }

      function hideCard() {
        document.getElementById("card").classList.remove("visible");
      }

      function setStatus(msg, isError) {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status" + (isError ? " error" : "");
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
